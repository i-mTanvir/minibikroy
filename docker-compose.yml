services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minibikroy-app
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      RUN_MIGRATIONS: "false"

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minibikroy-queue
    working_dir: /var/www/html
    depends_on:
      - app
    profiles:
      - worker
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    env_file:
      - .env
    environment:
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=0"]

volumes:
  node_modules:
